<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text-to-Speech App</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .features {
      margin-top: 25px;
      text-align: left;
      font-size: 14px;
      opacity: 0.9;
    }

    .features li {
      margin: 8px 0;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎤 Text-to-Speech</h1>
    <p>Převáděj text na hlas rychle, jednoduše a zdarma</p>

    <a class="btn"
       href="https://github.com/MarioSamCoding/Text-to-speech/releases/latest/download/main.zip">
      ⬇ Stáhnout aplikaci
    </a>

    <ul class="features">
      <li>⚡ Rychlé offline spuštění (.exe)</li>
      <li>🗣️ Přirozený hlasový výstup</li>
      <li>💻 Funguje na Windows</li>
      <li>📦 Bez instalace</li>
    </ul>

    <div class="footer">
      verze 1.0 • vytvořeno s ❤️
    </div>
  </div>
</body>
</html>
